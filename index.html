<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upfront Idiomas — Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1a1a2e;--red:#8B1A1A;--teal:#0C5460;--brown:#4A3728;
  --teal-light:#D1ECF1;--bg:#eaecf2;--white:#fff;--border:#dde1e7;
  --text:#1a1a2e;--muted:#6c757d;--success:#28a745;--danger:#dc3545;
}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.screen{display:none;} .screen.active{display:block;}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;background:linear-gradient(145deg,#0f0f1e 0%,#1a1a2e 55%,#0c3a45 100%);}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:2rem;}
.brand-logo{width:54px;height:54px;border-radius:14px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;}
.brand h1{font-size:26px;font-weight:800;color:#fff;letter-spacing:-.3px;}
.card{background:var(--white);border-radius:20px;padding:2rem;width:100%;max-width:420px;box-shadow:0 16px 48px rgba(0,0,0,.35);}
.login-tabs{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:1.5rem;}
.ltab{flex:1;padding:9px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:.15s;}
.ltab.on-t{background:var(--navy);color:#fff;}
.ltab.on-s{background:var(--teal);color:#fff;}
.ltab.on-a{background:#6f42c1;color:#fff;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px;font-weight:500;}
.field input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;transition:.15s;background:#fff;}
.field input:focus{border-color:var(--teal);}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;display:inline-block;text-align:center;}
.btn:hover{opacity:.88;transform:translateY(-1px);}
.btn-navy{background:var(--navy);color:#fff;}
.btn-teal{background:var(--teal);color:#fff;}
.btn-red{background:var(--red);color:#fff;}
.btn-purple{background:#6f42c1;color:#fff;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-full{width:100%;margin-top:.5rem;}
.err-msg{color:var(--danger);font-size:12px;margin-bottom:8px;display:none;}
.hint{font-size:12px;color:var(--muted);text-align:center;margin-top:1rem;line-height:1.7;}
.hint code{background:#f0f0f0;padding:1px 5px;border-radius:4px;font-size:11px;}

/* HEADER */
.header{background:var(--white);border-bottom:1px solid var(--border);padding:0 1.75rem;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.h-left{display:flex;align-items:center;gap:12px;}
.h-logo{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;}
.h-title{font-size:15px;font-weight:800;}
.h-sub{font-size:12px;color:var(--muted);}
.h-right{display:flex;align-items:center;gap:8px;}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;}
.badge-t{background:var(--navy);color:#fff;}
.badge-s{background:var(--teal-light);color:var(--teal);}
.badge-a{background:#e8d5ff;color:#6f42c1;}
.h-nav{font-size:13px;padding:6px 12px;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:none;color:var(--muted);}
.h-nav:hover{border-color:#aaa;}
.h-nav.on{border-color:var(--navy);color:var(--navy);font-weight:600;}

/* LEVEL BAR */
.level-bar{background:var(--white);border-bottom:1px solid var(--border);padding:.85rem 1.75rem;display:flex;gap:8px;flex-wrap:wrap;}
.lvl-btn{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--muted);transition:.15s;}
.lvl-btn:hover{border-color:#aaa;}
.lvl-A1.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.lvl-A2.on{background:var(--red);color:#fff;border-color:var(--red);}
.lvl-B1.on{background:var(--teal);color:#fff;border-color:var(--teal);}
.lvl-B2.on{background:var(--brown);color:#fff;border-color:var(--brown);}

/* CONTENT */
.content{padding:1.75rem;max-width:1120px;margin:0 auto;}
.page-title{font-size:20px;font-weight:700;margin-bottom:1.25rem;color:var(--navy);}
.level-header{margin-bottom:1.25rem;}
.level-title{font-size:20px;font-weight:700;margin-bottom:4px;}
.level-desc{font-size:13px;color:var(--muted);}
.classes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.class-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:1.1rem;transition:.2s;}
.class-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.12);transform:translateY(-2px);}
.class-card.test-card{border-color:#f0b840;background:#fffdf0;}
.cc-num{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.cc-title{font-size:14px;font-weight:800;margin-bottom:8px;letter-spacing:-.2px;}
.cc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.tag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;}
.tag-s{background:#e6f1fb;color:#185FA5;}
.tag-t{background:#fcebeb;color:#A32D2D;}
.tag-hw{background:#eaf3de;color:#3B6D11;}
.tag-test{background:#faeeda;color:#854F0B;}
.tag-done{background:#d4edda;color:#155724;}
.tag-draft{background:#cce5ff;color:#004085;}
.cc-actions{display:flex;flex-direction:column;gap:5px;}
.cc-btn{width:100%;padding:7px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid;transition:.15s;text-align:center;text-decoration:none;display:block;}
.cc-btn:hover{opacity:.85;}
.cc-btn-pdf-s{background:#e6f1fb;color:#185FA5;border-color:#b8d4f0;}
.cc-btn-pdf-t{background:#fcebeb;color:#A32D2D;border-color:#f5c0c0;}
.cc-btn-hw{background:var(--teal-light);color:var(--teal);border-color:#bee5eb;}
.cc-btn-corr{background:#fcebeb;color:var(--red);border-color:#f5c0c0;}
.cc-btn-audio{background:#f3e8ff;color:#6f42c1;border-color:#d4b8f5;}
.info-bar{background:var(--teal-light);border:1px solid #bee5eb;border-radius:8px;padding:10px 14px;margin-bottom:1.25rem;font-size:13px;color:var(--teal);}
.empty-state{text-align:center;padding:3rem;color:var(--muted);font-size:14px;}

/* ADMIN */
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
@media(max-width:700px){.admin-grid{grid-template-columns:1fr;}}
.admin-section{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:1.25rem;}
.admin-section h3{font-size:15px;font-weight:700;margin-bottom:1rem;color:var(--navy);}
.user-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem;max-height:260px;overflow-y:auto;}
.user-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:#fafbfc;font-size:13px;}
.u-name{font-weight:600;}
.u-login{font-size:11px;color:var(--muted);}
.btn-del{background:none;border:none;color:var(--danger);cursor:pointer;font-size:15px;padding:2px 6px;border-radius:4px;}
.btn-del:hover{background:#fff5f5;}
.add-form{border-top:1px solid var(--border);padding-top:1rem;display:flex;flex-direction:column;gap:8px;}
.add-form input{padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;}
.add-form input:focus{border-color:var(--teal);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:1.5rem;overflow:hidden;}
.modal{background:var(--white);border-radius:16px;width:100%;max-width:820px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.2);overflow:hidden;}
.mh{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;border-radius:16px 16px 0 0;flex-shrink:0;}
.mh h2{font-size:16px;font-weight:700;color:#fff;}
.mh p{font-size:12px;color:rgba(255,255,255,.75);margin-top:2px;}
.mh-close{background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;line-height:32px;text-align:center;}
.mb{padding:1.5rem;overflow-y:auto;flex:1;}
.ma{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;border-radius:0 0 16px 16px;flex-shrink:0;background:#fafbfc;}

/* AUDIO PLAYER */
.audio-modal .mb{padding:1.25rem 1.5rem;}
.audio-list{display:flex;flex-direction:column;gap:12px;}
.audio-item{background:#f8f9fa;border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.audio-item-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.audio-item audio{width:100%;height:36px;}

/* HOMEWORK STEPPER */
.stepper{display:flex;margin-bottom:1.5rem;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.step-btn{flex:1;padding:10px 6px;border:none;background:#f8f9fa;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);transition:.15s;border-right:1px solid var(--border);text-align:center;line-height:1.3;}
.step-btn:last-child{border-right:none;}
.step-btn.current{background:var(--teal);color:#fff;}
.step-btn.done{background:#d4edda;color:#155724;}
.etapa-panel{display:none;}
.etapa-panel.active{display:block;}
.etapa-header{background:var(--teal);color:#fff;padding:10px 14px;border-radius:8px;margin-bottom:1rem;font-size:14px;font-weight:700;}
.section-title{font-size:13px;font-weight:700;color:var(--navy);margin:1rem 0 .6rem;padding-bottom:4px;border-bottom:2px solid var(--teal-light);}
.ex-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:.5rem;}
.ex-table th{background:#f0f4f8;padding:7px 10px;text-align:left;font-weight:600;color:var(--muted);font-size:12px;border:1px solid var(--border);}
.ex-table td{padding:7px 10px;border:1px solid var(--border);vertical-align:middle;}
.ex-table tr:nth-child(even) td{background:#fafbfc;}
.ans-field{width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:13px;outline:none;resize:none;transition:.15s;font-family:inherit;min-height:34px;}
.ans-field:focus{border-color:var(--teal);}
.ans-field:disabled{background:#f4f4f4;color:#555;}
.match-sel{width:56px;border:1px solid var(--border);border-radius:6px;padding:5px 4px;font-size:13px;outline:none;text-align:center;}
.match-sel:focus{border-color:var(--teal);}
.match-sel:disabled{background:#f4f4f4;}
.match-ref-box{background:#f8f9fa;border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:.75rem;font-size:12px;line-height:2;}
.etapa-footer{display:flex;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border);gap:8px;align-items:center;}
.fb-student{background:#e8f5e9;border:1px solid #a5d6a7;border-radius:8px;padding:10px 14px;margin-bottom:1rem;font-size:13px;color:#1b5e20;}
.fb-student strong{display:block;margin-bottom:4px;}

/* CORRECTION */
.corr-etapa-block{margin-bottom:1.25rem;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.corr-etapa-header{background:var(--teal);color:#fff;padding:8px 14px;font-size:13px;font-weight:700;}
.corr-section-header{background:#f0f4f8;padding:6px 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);}
.corr-rows{padding:8px 12px;display:flex;flex-direction:column;gap:6px;}
.corr-row{display:flex;gap:6px;align-items:flex-start;padding:5px 7px;background:#fafbfc;border-radius:6px;border:1px solid var(--border);font-size:12px;}
.corr-num{font-weight:700;color:var(--muted);min-width:22px;}
.corr-q{color:#777;flex:1.2;font-size:11px;line-height:1.4;}
.corr-ans{flex:1.3;font-weight:500;line-height:1.4;}
.corr-key{color:var(--success);flex:1.3;font-size:11px;line-height:1.4;}
.corr-st{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap;}
.st-ok{background:#d4edda;color:#155724;}
.st-err{background:#f8d7da;color:#721c24;}
.st-skip{background:#e2e3e5;color:#383d41;}
.sub-card{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px;}
.sub-head{padding:12px 1rem;background:#f8f9fa;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.sub-head:hover{background:#eee;}
.sub-detail{display:none;padding:1rem;}
.sub-detail.open{display:block;}
.fb-box{margin-top:12px;border-top:1px solid var(--border);padding-top:12px;}
.fb-box label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;}
.fb-box textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px;font-size:13px;resize:vertical;min-height:60px;outline:none;font-family:inherit;}
.fb-box textarea:focus{border-color:var(--teal);}


/* CORRECTION STEPPER */
.corr-student-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
.corr-stab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--muted);transition:.15s;}
.corr-stab.active{background:var(--red);color:#fff;border-color:var(--red);}
.corr-stab-score{font-size:10px;margin-left:4px;opacity:.8;}
.corr-stepper{display:flex;margin-bottom:1.25rem;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.corr-step-btn{flex:1;padding:9px 6px;border:none;background:#f8f9fa;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);transition:.15s;border-right:1px solid var(--border);text-align:center;line-height:1.3;}
.corr-step-btn:last-child{border-right:none;}
.corr-step-btn.active{background:var(--teal);color:#fff;}
.corr-etapa-view{display:none;}
.corr-etapa-view.active{display:block;}
.corr-student-panel{display:none;}
.corr-student-panel.active{display:block;}
.score-summary{display:flex;align-items:center;gap:12px;background:#f0f9ff;border:1px solid #bee5eb;border-radius:8px;padding:10px 14px;margin-bottom:1rem;}
.score-num{font-size:22px;font-weight:700;color:var(--teal);}
.score-bar-wrap{flex:1;height:8px;background:#dde1e7;border-radius:10px;overflow:hidden;}
.score-bar-fill{height:100%;background:var(--teal);border-radius:10px;transition:width .3s;}
.score-pct{font-size:13px;font-weight:600;color:var(--muted);}


/* HW EXERCISE TABS (A / B / C) */
.hw-ex-tabs{display:flex;gap:0;margin-bottom:1.25rem;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;background:#f8f9fa;}
.hw-ex-tab{flex:1;padding:10px 6px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:700;color:var(--muted);transition:.15s;border-right:1.5px solid var(--border);text-align:center;line-height:1.3;}
.hw-ex-tab:last-child{border-right:none;}
.hw-ex-tab.active{background:var(--teal);color:#fff;}
.hw-ex-tab.done{background:#d4edda;color:#155724;}
.hw-ex-panel{display:none;}
.hw-ex-panel.active{display:block;}
.ex-header{background:linear-gradient(135deg,var(--teal),#0a6b7c);color:#fff;padding:10px 16px;border-radius:10px;margin-bottom:1rem;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:space-between;}
.ex-header-title{font-size:14px;font-weight:800;}
.ex-header-sub{font-size:11px;opacity:.8;margin-top:2px;}
.btn-redo{font-size:11px;padding:5px 12px;border-radius:20px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;cursor:pointer;font-weight:700;transition:.15s;}
.btn-redo:hover{background:rgba(255,255,255,.35);}
.ex-table{width:100%;border-collapse:collapse;font-size:13px;border-radius:10px;overflow:hidden;margin-bottom:.5rem;}
.ex-table th{background:#f0f4f8;padding:8px 12px;text-align:left;font-weight:700;color:var(--muted);font-size:11px;border:1px solid var(--border);text-transform:uppercase;letter-spacing:.4px;}
.ex-table td{padding:7px 12px;border:1px solid var(--border);vertical-align:middle;}
.ex-table tr:nth-child(even) td{background:#fafbfc;}
.ans-field{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:6px 8px;font-size:13px;outline:none;resize:none;transition:.15s;font-family:inherit;min-height:32px;}
.ans-field:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(12,84,96,.1);}
.ans-field:disabled{background:#f4f4f4;color:#555;}
.match-ref-box{background:linear-gradient(135deg,#f0f7ff,#e8f4fd);border:1px solid #b8d4f0;border-radius:10px;padding:11px 14px;margin-bottom:.85rem;font-size:12px;line-height:2.2;}
.match-sel{width:60px;border:1.5px solid var(--border);border-radius:7px;padding:5px 4px;font-size:13px;outline:none;text-align:center;}
.match-sel:focus{border-color:var(--teal);}
.match-sel:disabled{background:#f4f4f4;}
.mc-opts{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:4px;}
.mc-opt{display:flex;align-items:center;gap:6px;padding:5px 9px;border:1.5px solid var(--border);border-radius:7px;cursor:pointer;font-size:12px;transition:.15s;background:#fff;}
.mc-opt:hover{border-color:var(--teal);background:#f0fafa;}
.mc-opt input{accent-color:var(--teal);}
.mc-opt.disabled{pointer-events:none;opacity:.75;}
.ex-footer{display:flex;justify-content:flex-end;margin-top:1rem;padding-top:.85rem;border-top:1px solid var(--border);gap:8px;align-items:center;}
.ex-done-badge{font-size:12px;font-weight:700;color:var(--success);}
.etapa-label{font-size:13px;font-weight:800;color:var(--navy);margin-bottom:.75rem;padding:8px 14px;background:#f0f4f8;border-radius:8px;border-left:4px solid var(--teal);}
.fb-student{background:#e8f5e9;border:1px solid #a5d6a7;border-radius:10px;padding:12px 16px;margin-bottom:1rem;font-size:13px;color:#1b5e20;}
.fb-student strong{display:block;margin-bottom:4px;font-weight:800;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a2e;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2);transition:opacity .3s;}

/* PAGE TRANSITIONS */
@keyframes ufPageIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes ufPageOut{from{opacity:1;}to{opacity:0;}}
.screen.active{animation:ufPageIn .32s ease;}
.screen.leaving{display:block!important;animation:ufPageOut .2s ease forwards;pointer-events:none;}
</style>
</head>
<body>

<!-- ══════════════ LOGIN ══════════════ -->
<div id="loginScreen" class="screen active">
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;">
    <div class="brand">
      <div class="brand-logo">UF</div>
      <h1>Upfront Idiomas</h1>
    </div>
    <div class="card">
      <div class="login-tabs">
        <button class="ltab on-t" id="tabT" onclick="switchTab('teacher')">👨‍🏫 Professor</button>
        <button class="ltab" id="tabS" onclick="switchTab('student')">🎓 Aluno</button>
        <button class="ltab" id="tabA" onclick="switchTab('admin')">🔑 Admin</button>
      </div>
      <div class="field"><label>Login</label>
        <input type="text" id="loginUser" placeholder="seu login" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <div class="field"><label>Senha</label>
        <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <div id="loginErr" class="err-msg"></div>
      <button class="btn btn-navy btn-full" id="loginBtn" onclick="doLogin()">Entrar</button>
      <div style="margin-top:1rem;text-align:center;">

var CU=null,CR=null,CL=null,hwClassKey=null,hwStep=0,loginTab='teacher';

function showForgotPass(){
  var msg=document.getElementById('forgotMsg');
  var role=loginTab;
  var login=document.getElementById('loginUser').value.trim();
  var emailTo='upfront2084@gmail.com';
  var subject=encodeURIComponent('Recuperação de Senha — Portal Upfront');
  var body=encodeURIComponent(
    'Olá,\n\nPreciso recuperar minha senha no Portal Upfront Idiomas.\n\nLogin: '+(login||'(não informado)')+'\nPerfil: '+role+'\n\nAguardo retorno. Obrigado.'
  );
  var mailto='mailto:'+emailTo+'?subject='+subject+'&body='+body;
  msg.innerHTML='Será aberto seu app de email para enviar a solicitação para <strong>'+emailTo+'</strong>.<br><a href="'+mailto+'" style="color:var(--teal);font-weight:700;">Clique aqui para enviar</a>';
  msg.style.display='block';
}

function switchTab(role){
  loginTab=role;
  ['tabT','tabS','tabA'].forEach(function(id){document.getElementById(id).className='ltab';});
  document.getElementById('tab'+role.charAt(0).toUpperCase()).className='ltab on-'+role.charAt(0);
  var colors={teacher:'btn-navy',student:'btn-teal',admin:'btn-purple'};
  var labels={teacher:'Entrar como Professor',student:'Entrar como Aluno',admin:'Entrar como Admin'};
  document.getElementById('loginBtn').className='btn '+colors[role]+' btn-full';
  document.getElementById('loginBtn').textContent=labels[role];
}

function doLogin(){
  var login=document.getElementById('loginUser').value.trim().toLowerCase();
  var pass=document.getElementById('loginPass').value;
  var err=document.getElementById('loginErr');
  err.style.display='none';
  if(!login||!pass){err.textContent='Preencha login e senha.';err.style.display='block';return;}

  // Admin check
  if(loginTab==='admin'){
    if(login!==ADMIN_CREDS.login||pass!==ADMIN_CREDS.pass){
      err.textContent='Credenciais de admin incorretas.';err.style.display='block';return;
    }
    CU='admin';CR='admin';
    startApp('🔑 Admin Master','#6f42c1','Admin','badge-a');
    showView('admin');
    return;
  }

  var u=getUser(login);
  if(!u){err.textContent='Usuário não encontrado.';err.style.display='block';return;}
  if(u.pass!==pass){err.textContent='Senha incorreta.';err.style.display='block';return;}
  if(u.role!==loginTab){err.textContent='Este usuário é "'+u.role+'". Selecione a aba correta.';err.style.display='block';return;}
  CU=login;CR=u.role;
  var color=CR==='teacher'?'#1a1a2e':'#0C5460';
  var badgeCls=CR==='teacher'?'badge-t':'badge-s';
  startApp((CR==='teacher'?'Portal do Professor':'Portal do Aluno')+' — '+u.name, color, CR==='teacher'?'Professor':'Aluno', badgeCls);
  showView('aulas');
  setLevel('A1');
}

function startApp(sub,color,badgeTxt,badgeCls){
  var ls=document.getElementById('loginScreen');
  var as=document.getElementById('appScreen');
  ls.className='screen leaving';
  setTimeout(function(){ls.className='screen';},220);
  as.className='screen active';
  document.getElementById('hLogo').style.background=color;
  document.getElementById('hSub').textContent=sub;
  document.getElementById('hBadge').textContent=badgeTxt;
  document.getElementById('hBadge').className='badge '+badgeCls;
  // nav buttons
  document.getElementById('navAulas').style.display=(CR==='teacher'||CR==='student')?'':'none';
  document.getElementById('navAdmin').style.display=(CR==='admin')?'':'none';
  // admin-only hides aulas
  if(CR==='admin'){
    document.getElementById('navAulas').style.display='none';
    document.getElementById('navAdmin').style.display='';
  }
}

function doLogout(){
  CU=null;CR=null;CL=null;
  var as=document.getElementById('appScreen');
  var ls=document.getElementById('loginScreen');
  as.className='screen leaving';
  setTimeout(function(){as.className='screen';ls.className='screen active';},220);
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  document.getElementById('loginErr').style.display='none';
  switchTab('teacher');
}

//  VIEWS
// ═══════════════════════════════════════════════
function showView(v){
  document.getElementById('viewAulas').style.display=v==='aulas'?'block':'none';
  document.getElementById('viewAdmin').style.display=v==='admin'?'block':'none';
  document.getElementById('navAulas').className='h-nav'+(v==='aulas'?' on':'');
  document.getElementById('navAdmin').className='h-nav'+(v==='admin'?' on':'');
  if(v==='admin') renderAdmin();
}

// ═══════════════════════════════════════════════
//  ADMIN
// ═══════════════════════════════════════════════
function renderAdmin(){
  var u=loadUsers();
  renderUList('teacherList','tCount',u.teacher,'teacher');
  renderUList('studentList','sCount',u.student,'student');
}
function renderUList(listId,countId,map,role){
  var keys=Object.keys(map);
  document.getElementById(countId).textContent='('+keys.length+')';
  var html='';
  keys.forEach(function(k){
    html+='<div class="user-item"><div><div class="u-name">'+esc(map[k].name)+'</div><div class="u-login">Login: <code>'+k+'</code></div></div>';
    html+='<button class="btn-del" onclick="delUser(\''+role+'\',\''+k+'\')">🗑</button></div>';
  });
  if(!html) html='<div style="text-align:center;padding:1rem;font-size:13px;color:var(--muted);">Nenhum cadastrado.</div>';
  document.getElementById(listId).innerHTML=html;
}
function addUser(role){
  var p=role==='teacher'?'t':'s';
  var name=document.getElementById(p+'Name').value.trim();
  var login=document.getElementById(p+'Login').value.trim().toLowerCase().replace(/\s+/g,'');
  var pass=document.getElementById(p+'Pass').value;
  var errEl=document.getElementById(p+'Err');
  errEl.style.display='none';
  if(!name||!login||!pass){errEl.textContent='Preencha todos os campos.';errEl.style.display='block';return;}
  if(!/^[a-z0-9._-]+$/.test(login)){errEl.textContent='Login: use letras, números, ponto ou hífen.';errEl.style.display='block';return;}
  if(login===ADMIN_CREDS.login){errEl.textContent='Login reservado.';errEl.style.display='block';return;}
  var u=loadUsers();
  if(u.teacher[login]||u.student[login]){errEl.textContent='Login já existe.';errEl.style.display='block';return;}
  u[role][login]={name:name,pass:pass,role:role};
  saveUsers(u);
  document.getElementById(p+'Name').value='';
  document.getElementById(p+'Login').value='';
  document.getElementById(p+'Pass').value='';
  renderAdmin();
  showToast((role==='teacher'?'Professor':'Aluno')+' adicionado!');
}
function delUser(role,login){
  if(login===CU){alert('Não é possível excluir o usuário atual.');return;}
  if(!confirm('Excluir "'+login+'"?')) return;
  var u=loadUsers();
  delete u[role][login];
  saveUsers(u);
  renderAdmin();
  showToast('Usuário removido.');
}

//  LEVELS & CLASSES
// ═══════════════════════════════════════════════
function setLevel(lvl){
  CL=lvl;
  document.querySelectorAll('.lvl-btn').forEach(function(b){b.classList.remove('on');});
  document.querySelectorAll('.lvl-'+lvl).forEach(function(b){b.classList.add('on');});
  renderClasses(lvl);
}

function renderClasses(lvl){
  var classes=DRIVES[lvl];
  var isTeacher=CR==='teacher';
  var html='<div class="level-header"><div class="level-title" style="color:'+LVL_COLORS[lvl]+'">'+lvl+' — '+LVL_NAMES[lvl]+'</div>';
  html+='<div class="level-desc">'+classes.length+' itens neste nível</div></div>';
  if(!isTeacher) html+='<div class="info-bar">📌 Clique nos botões para abrir o material, ouvir áudios ou fazer o homework.</div>';
  html+='<div class="classes-grid">';
  classes.forEach(function(c){
    var isTest=!!c.test;
    var ck=c.ck||(lvl+'-'+c.n);
    var cd=CLASS_DATA[ck]||{};
    var label=isTest?String(c.n):'Class '+c.n;
    var hasHW=!!HOMEWORK[ck];
    var hasAudio=!!(cd.audios&&cd.audios.length);
    var sub=!isTeacher?loadSub(CU,ck):null;
    var isSubmitted=sub&&sub.submitted;
    var isDraft=sub&&!sub.submitted;
    html+='<div class="class-card'+(isTest?' test-card':'')+'">';
    html+='<div class="cc-num">'+lvl+(isTest?' · Revisão':' · Aula')+'</div>';
    html+='<div class="cc-title">'+label+'</div>';
    html+='<div class="cc-tags">';
    if(!isTest){
      if(isTeacher){html+='<span class="tag tag-t">Teacher</span><span class="tag tag-s">Student</span>';if(hasHW)html+='<span class="tag tag-hw">HW</span>';}
      else{
        html+='<span class="tag tag-s">Material</span>';
        if(isSubmitted)html+='<span class="tag tag-done">✓ Enviado</span>';
        else if(isDraft)html+='<span class="tag tag-draft">Rascunho</span>';
      }
    }else{html+='<span class="tag tag-test">Teste</span>';}
    html+='</div><div class="cc-actions">';
    if(!isTest){
      if(isTeacher){
        if(cd.teacherPdf) html+='<a class="cc-btn cc-btn-pdf-t" href="'+pdfUrl(cd.teacherPdf)+'" target="_blank">📄 Teacher PDF</a>';
        if(cd.studentPdf) html+='<a class="cc-btn cc-btn-pdf-s" href="'+pdfUrl(cd.studentPdf)+'" target="_blank">📄 Student PDF</a>';
        if(!cd.teacherPdf&&!cd.studentPdf&&cd.folder) html+='<a class="cc-btn cc-btn-pdf-s" href="'+folderUrl(cd.folder)+'" target="_blank">📁 Pasta Drive</a>';
        if(hasAudio) html+='<button class="cc-btn cc-btn-audio" onclick="openAudio(\''+ck+'\')">🎧 Áudios</button>';
        if(hasHW) html+='<button class="cc-btn cc-btn-corr" onclick="openCORR(\''+ck+'\')">✏️ Ver Correções</button>';
      }else{
        if(cd.studentPdf) html+='<a class="cc-btn cc-btn-pdf-s" href="'+pdfUrl(cd.studentPdf)+'" target="_blank">📄 Abrir Material</a>';
        else if(cd.folder) html+='<a class="cc-btn cc-btn-pdf-s" href="'+folderUrl(cd.folder)+'" target="_blank">📁 Pasta Drive</a>';
        if(hasAudio) html+='<button class="cc-btn cc-btn-audio" onclick="openAudio(\''+ck+'\')">🎧 Ouvir Áudios</button>';
        if(hasHW){html+='<button class="cc-btn cc-btn-hw" onclick="openHW(\''+ck+'\')">📝 '+(isSubmitted?'Ver Homework':(isDraft?'Continuar Homework':'Fazer Homework'))+'</button>';if(isSubmitted) html+='<button class="cc-btn" style="background:#fff3cd;color:#856404;border-color:#ffc107;" onclick="resetHW(\''+ck+'\')">🔄 Refazer Homework</button>';}
      }
    }else{
      var tu=c.testUrl||'';
      if(tu) html+='<a class="cc-btn cc-btn-hw" style="background:#e8f5e9;color:#1b5e20;border-color:#a5d6a7;" href="'+tu+'" target="_blank">🔗 Abrir Teste Online</a>';
    }
    html+='</div></div>';
  });
  html+='</div>';
  document.getElementById('mainContent').innerHTML=html;
}

// ═══════════════════════════════════════════════
function openAudio(ck){
  var cd=CLASS_DATA[ck];
  if(!cd||!cd.audios||!cd.audios.length){showToast('Áudios não disponíveis.');return;}
  document.getElementById('audioTitle').textContent='Áudios — Class '+ck.split('-')[1];
  var html='';
  cd.audios.forEach(function(a){
    html+='<div class="audio-item">';
    html+='<div class="audio-item-title">🎵 '+esc(a.title)+'</div>';
    // Use Google Drive embedded player — plays directly without opening Drive
    html+='<iframe src="https://drive.google.com/file/d/'+a.id+'/preview" ';
    html+='width="100%" height="80" frameborder="0" allow="autoplay" ';
    html+='style="border-radius:8px;border:1px solid var(--border);display:block;"></iframe>';
    html+='</div>';
  });
  document.getElementById('audioList').innerHTML=html;
  document.getElementById('audioModal').style.display='flex';
}
function closeAudio(){document.getElementById('audioModal').style.display='none';}

//  HOMEWORK STORAGE
// ═══════════════════════════════════════════════
function hwKey(u,ck){return 'uf_hw_'+u+'_'+ck;}
function fbKey(ck,u){return 'uf_fb_'+ck+'_'+u;}
function loadSub(u,ck){return LS.get(hwKey(u,ck));}
function saveSub(u,ck,data){LS.set(hwKey(u,ck),data);}
function loadFb(ck,u){return LS.raw(fbKey(ck,u));}
function saveFbData(ck,u,txt){LS.setRaw(fbKey(ck,u),txt);}
function getAllSubs(ck){
  var out=[];var us=loadUsers();
  Object.keys(us.student).forEach(function(s){
    var d=loadSub(s,ck);
    if(d&&d.submitted) out.push({user:s,name:us.student[s].name,data:d});
  });
  return out;
}

// ═══════════════════════════════════════════════
//  HOMEWORK MODAL
// ═══════════════════════════════════════════════
function openHW(ck){
  var hw=HOMEWORK[ck];
  if(!hw){showToast('Homework não disponível ainda.');return;}
  hwClassKey=ck;hwStep=0;
  var saved=loadSub(CU,ck);
  var isSubmitted=saved&&saved.submitted;
  document.getElementById('hwTitle').textContent=hw.title;
  document.getElementById('hwSub').textContent=isSubmitted?'Enviado — aguardando correção':'Preencha e envie ao professor';
  renderHWBody(hw,saved,isSubmitted);
  document.getElementById('hwModal').style.display='flex';
}

function renderHWBody(hw,saved,isSubmitted){
  var sAns=(saved&&saved.answers)?saved.answers:{};
  var exDone=(saved&&saved.exDone)?saved.exDone:{};

  // feedback from teacher
  var fbHtml='';
  var fb=loadFb(hwClassKey,CU);
  if(fb) fbHtml='<div class="fb-student"><strong>💬 Feedback do professor:</strong>'+esc(fb)+'</div>';

  // build body: 3 etapas, each with 3 exercise tabs (A/B/C)
  var body='';
  hw.etapas.forEach(function(etapa,ei){

function hwSelEx(ei,xi){
  // switch tab
  document.querySelectorAll('#extabs_'+ei+' .hw-ex-tab').forEach(function(b,i){
    if(!b.classList.contains('done')) b.classList.toggle('active',i===xi);
    else b.classList.remove('active');
    if(i===xi&&!b.classList.contains('done')) b.classList.add('active');
  });
  // fix: just toggle active on all
  document.querySelectorAll('#extabs_'+ei+' .hw-ex-tab').forEach(function(b,i){
    b.classList.toggle('active',i===xi);
  });
  // show panel
  var hw=HOMEWORK[hwClassKey];
  hw.etapas[ei].exercises.forEach(function(ex,i){
    var p=document.getElementById('exp_'+ei+'_'+i);
    if(p) p.classList.toggle('active',i===xi);
  });
}

function doneEx(ei,xi){
  var saved=loadSub(CU,hwClassKey)||{};
  saved.answers=collectAnswers();
  if(!saved.exDone) saved.exDone={};
  saved.exDone['e'+ei+'x'+xi]='done';
  saved.savedAt=new Date().toISOString();
  saveSub(CU,hwClassKey,saved);
  var panel=document.getElementById('exp_'+ei+'_'+xi);
  // show green/red per field WITHOUT revealing the correct answer
  var hw=HOMEWORK[hwClassKey];
  var ex=hw.etapas[ei].exercises[xi];
  if(panel&&ex){
    if(ex.type==='translation'||ex.type==='unscramble'||ex.type==='findmistake'){
      (ex.items||[]).forEach(function(item,i){
        var k='e'+ei+'x'+xi+'i'+i;
        var field=document.getElementById(k);
        var ans=(saved.answers&&saved.answers[k])||'';
        if(field){
          if(ans.trim()===''){field.style.background='#fff3cd';field.style.borderColor='#ffc107';}
          else if(norm(ans)===norm(item.en||item.answer)){field.style.background='#d4edda';field.style.borderColor='#28a745';}
          else{field.style.background='#f8d7da';field.style.borderColor='#dc3545';}
        }
      });
    }else if(ex.type==='match'){
      var dispR=shuffleArr(ex.right,ei*100+xi*10);
      (ex.left||[]).forEach(function(en,i){
        var k='e'+ei+'x'+xi+'i'+i;
        var field=document.getElementById(k);
        var ansNum=parseInt((saved.answers&&saved.answers[k])||0);
        var stuPt=ansNum>0?dispR[ansNum-1]:'';
        var corrPt=ex.right[ex.correctIdx[i]];
        if(field){
          if(!stuPt||ansNum===0){field.style.background='#fff3cd';field.style.borderColor='#ffc107';}
          else if(stuPt===corrPt){field.style.background='#d4edda';field.style.borderColor='#28a745';}
          else{field.style.background='#f8d7da';field.style.borderColor='#dc3545';}
        }
      });
    }else if(ex.type==='multiplechoice'){
      (ex.items||[]).forEach(function(item,i){
        var k='e'+ei+'x'+xi+'i'+i;
        var ans=(saved.answers&&saved.answers[k])||'';
        var isOk=norm(ans)===norm(item.correct);
        panel.querySelectorAll('input[name="'+k+'"]').forEach(function(inp){
          if(inp.checked){
            var lbl=inp.closest('label')||inp.parentElement;
            lbl.style.background=isOk?'#d4edda':'#f8d7da';
            lbl.style.borderColor=isOk?'#28a745':'#dc3545';
          }
        });
      });
    }
  }
  // disable fields in this panel
  if(panel){
    panel.querySelectorAll('.ans-field,.match-sel,input[type=radio]').forEach(function(el){el.disabled=true;});
    panel.querySelector('.ex-footer').innerHTML='<span class="ex-done-badge">✓ Exercício finalizado</span>';
    var hdr=panel.querySelector('.ex-header');
    if(hdr) hdr.innerHTML=hdr.innerHTML.replace(/<button class="btn-redo"[^>]*>.*?<\/button>/,'');
  }
  // mark tab done
  var tabs=document.querySelectorAll('#extabs_'+ei+' .hw-ex-tab');
  if(tabs[xi]) tabs[xi].className='hw-ex-tab done';
  // auto-advance to next exercise
  var nexXi=xi+1;
  if(nexXi<hw.etapas[ei].exercises.length) hwSelEx(ei,nexXi);
  showToast('Exercício finalizado!');
}

function redoEx(ei,xi){
  if(!confirm('Refazer este exercício? As respostas serão apagadas.')) return;
  var saved=loadSub(CU,hwClassKey)||{};
  if(!saved.exDone) saved.exDone={};
  delete saved.exDone['e'+ei+'x'+xi];
  // clear answers for this exercise
  var hw=HOMEWORK[hwClassKey];
  var ex=hw.etapas[ei].exercises[xi];
  if(!saved.answers) saved.answers={};
  var items=ex.items||ex.left||[];
  items.forEach(function(item,i){delete saved.answers['e'+ei+'x'+xi+'i'+i];});
  saved.savedAt=new Date().toISOString();
  saveSub(CU,hwClassKey,saved);
  var isSubmitted=saved.submitted;
  renderHWBody(hw,saved,isSubmitted);
  hwSelEx(ei,xi);
  showToast('Exercício refeito!');
}


function goStep(i){
  hwStep=i;
  document.querySelectorAll('.etapa-panel').forEach(function(p,idx){p.classList.toggle('active',idx===i);});
  document.querySelectorAll('.step-btn').forEach(function(b,idx){
    if(!b.classList.contains('done')) b.classList.toggle('current',idx===i);
  });
}

function collectAnswers(){
  var ans={};
  // text/select fields
  document.querySelectorAll('#hwBody textarea, #hwBody select').forEach(function(el){
    if(el.id) ans[el.id]=el.value||'';
  });
  // radio buttons — get checked value per question group
  var seen={};
  document.querySelectorAll('#hwBody input[type=radio]:checked').forEach(function(el){
    // name is the question key (e.g. e0x2i3)
    ans[el.name]=el.value;
    seen[el.name]=true;
  });
  return ans;
}

function saveHW(){
  var saved=loadSub(CU,hwClassKey)||{};
  saved.answers=collectAnswers();saved.savedAt=new Date().toISOString();
  saveSub(CU,hwClassKey,saved);showToast('Rascunho salvo!');
}

function submitHW(){
  if(!confirm('Enviar o homework ao professor?')) return;
  var saved=loadSub(CU,hwClassKey)||{};
  saved.answers=collectAnswers();saved.submitted=true;saved.submittedAt=new Date().toISOString();
  saveSub(CU,hwClassKey,saved);
  closeHW();setLevel(CL);showToast('Homework enviado com sucesso!');
}

  LS.set(hwKey(CU,ck),null);

//  UTILS
// ═══════════════════════════════════════════════
function norm(s){return (s||'').toLowerCase().replace(/[.,!?;:'"´`]/g,'').replace(/\s+/g,' ').trim();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Deterministic shuffle (different from left column, consistent per class)
function shuffleArr(arr,seed){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j=Math.abs(Math.sin(seed*(i+3)+7)*10000)%i|0;
    var t=a[i];a[i]=a[j];a[j]=t;
  }
  return a;
}

function calcScore(hw,answers){
  var total=0,correct=0;
  hw.etapas.forEach(function(etapa,ei){
    (etapa.exercises||etapa.sections||[]).forEach(function(ex,xi){
      if(ex.type==='match'){
        var dispR=shuffleArr(ex.right,ei*100+xi*10);
        (ex.left||[]).forEach(function(en,i){
          total++;
          var k='e'+ei+'x'+xi+'i'+i;
          var ansNum=parseInt((answers&&answers[k])||0);
          var stuPt=ansNum>0?dispR[ansNum-1]:'';
          if(stuPt===ex.right[ex.correctIdx[i]]) correct++;
        });
      }else if(ex.type==='multiplechoice'){
        (ex.items||[]).forEach(function(item,i){
          total++;
          var k='e'+ei+'x'+xi+'i'+i;
          var ans=(answers&&answers[k])||'';
          if(norm(ans)===norm(item.correct)) correct++;
        });
      }else{
        (ex.items||[]).forEach(function(item,i){
          total++;
          var k='e'+ei+'x'+xi+'i'+i;
          var ans=(answers&&answers[k])||'';
          if(norm(ans)===norm(item.en||item.answer)) correct++;
        });
      }
    });
  });
  return{total:total,correct:correct};
}

function showToast(msg){
  var old=document.querySelector('.toast');if(old)old.remove();
  var t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.remove();},300);},2200);
}

// Init
switchTab('teacher');
</script>
